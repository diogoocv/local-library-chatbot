<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Local Library Assistant</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            background-color: #f9f9f9; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; font-size: 18px; color: #333; }
        #chat-history { 
            background: white; 
            border: 1px solid #ccc; 
            border-radius: 4px;
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px; 
            margin-bottom: 10px; 
        }
        .message { margin-bottom: 10px; line-height: 1.4; }
        .user-msg { color: #0056b3; }
        .bot-msg { color: #333; }
        .error-msg { color: #d9534f; }
        .input-area { display: flex; gap: 8px; }
        input { 
            flex-grow: 1; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            padding: 8px 15px; 
            cursor: pointer; 
            background-color: #0078d7; 
            color: white; 
            border: none; 
            border-radius: 4px; 
        }
        button:hover { background-color: #005a9e; }
    </style>
</head>
<body>
    <h2>Zotero Library Assistant</h2>
    <div style="margin-bottom: 10px; background: #e9ecef; padding: 10px; border-radius: 4px; font-size: 12px;">
        <label for="api-key"><b>Insert your Google Gemini API Key:</b></label>
        <input type="password" id="api-key" placeholder="AIzaSy..." style="width: 100%; margin-top: 5px; padding: 5px;">
    </div>

    <div id="chat-history">
        <div class="message bot-msg"><b>Assistant:</b> Hello! Ask me a question about your local library.</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="question" placeholder="Ask a question about your papers...">
        <button id="ask-btn">Send</button>
    </div>

    <script src="chat.js"></script>
</body>
</html>
